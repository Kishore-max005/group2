<!DOCTYPE html>
<html>
<head>
    <title>Expense Dashboard</title>

    <link rel="stylesheet" href="app.css">

    <!-- icons -->
    <script src="https://kit.fontawesome.com/4c5b5d1e2a.js" crossorigin="anonymous"></script>

    <!-- chart -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body id="body">

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>💰 Expense</h2>
    <p><i class="fa fa-home"></i> Dashboard</p>
    <p><i class="fa fa-chart-pie"></i> Reports</p>
    <p><i class="fa fa-cog"></i> Settings</p>

    <!-- DARK MODE BUTTON -->
    <button onclick="toggleDark()">🌙 Dark Mode</button>
</div>

<!-- MAIN -->
<div class="main">

    <h1>📊 Smart Dashboard</h1>

    <input id="search" placeholder="🔍 Search..." onkeyup="searchExpense()">

    <div class="form">
        <input type="number" id="amount" placeholder="Amount">
        <input type="text" id="category" placeholder="Category">
        <input type="text" id="description" placeholder="Description">
        <input type="date" id="date">
        <button onclick="addExpense()">➕ Add</button>
    </div>

    <div class="cards">

        <div class="card total">
            <p>💰 Total</p>
            <h2 id="total">0</h2>
        </div>

        <div class="card weekly">
            <p>📅 Weekly</p>
            <h2 id="weekly">0</h2>
        </div>

        <div class="card monthly">
            <p>📊 Monthly</p>
            <h2 id="monthly">0</h2>
        </div>

    </div>

    <div class="chart-box">
        <canvas id="chart"></canvas>
    </div>

    <div id="list"></div>

</div>

<script src="app.js"></script>

<!-- DARK MODE SCRIPT -->
<script>
function toggleDark(){
    document.body.classList.toggle("dark");
}
</script
