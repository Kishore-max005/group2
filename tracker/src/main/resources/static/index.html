<!DOCTYPE html>
<html>
<head>

<title>Expense Tracker Dashboard</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#4facfe,#00f2fe);
margin:0;
padding:0;
}

.container{
width:400px;
margin:40px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
text-align:center;
color:#333;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
background:#4facfe;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0077ff;
}

.list{
margin-top:20px;
}

.item{
background:#f2f2f2;
padding:10px;
margin:8px 0;
border-radius:6px;
display:flex;
justify-content:space-between;
}

.total{
text-align:center;
margin-top:15px;
font-size:18px;
font-weight:bold;
color:#444;
}

</style>

</head>

<body>

<div class="container">

<h1>💰 Expense Tracker</h1>

<input id="amount" placeholder="Amount">
<input id="category" placeholder="Category">
<input id="description" placeholder="Description">
<input id="date" type="date">

<button onclick="addExpense()">Add Expense</button>

<div class="total">
Total: ₹ <span id="total">0</span>
</div>

<div class="list" id="list"></div>

</div>

<script>

function addExpense(){

const expense={
amount:document.getElementById("amount").value,
category:document.getElementById("category").value,
description:document.getElementById("description").value,
date:document.getElementById("date").value
};

fetch("/expenses",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(expense)
})
.then(res=>res.json())
.then(data=>{
loadExpenses();
});

}

function loadExpenses(){

fetch("/expenses")
.then(res=>res.json())
.then(data=>{

const list=document.getElementById("list");
const totalBox=document.getElementById("total");

list.innerHTML="";

let total=0;

data.forEach(e=>{

total+=e.amount;

const div=document.createElement("div");
div.className="item";

div.innerHTML=
`<span>₹${e.amount} | ${e.category}</span>
<span>${e.description}</span>`;

list.appendChild(div);

});

totalBox.innerText=total;

});

}

loadExpenses();

</script>

</body>
</html>
